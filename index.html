<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rhodes Island Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="landing.css" />
</head>








<body class="index-page">

<div class="lang-switch">
  <button data-lang="en">EN</button>
  <button data-lang="fr">FR</button>
  <button data-lang="de">DE</button>
</div>





  <section class="hero">
    <h1>Rhodes Island</h1>
    <p>Discover • Taste • Explore • Experience</p>

    <div class="menu">
  <a href="restaurants.html" class="tab restaurants">
    🍽️ Restaurants
  </a>

  <a href="coffee.html" class="tab coffee">
    ☕ Coffee & Brunch
  </a>

  <a href="clubs.html" class="tab clubs">
    🎶 Clubs & Nightlife
  </a>

  <a href="beaches.html" class="tab beaches">
    🏖️ Beaches
  </a>

  <a href="activities.html" class="tab activities">
    🚴 Activities
  </a>

  <a href="sightseeing.html" class="tab sightseeing">
    🏛️ Culture
  </a>
</div>


    <button id="emergencyBtn" class="emergencyBtn-btn" onclick="window.location.href='useful-numbers.html'">
   
     </button>


  </section>

<script src="js/landing.js"></script>


<script>

// ---------------------------
// TRANSLATIONS
// ---------------------------

const translations = {
  en: "Emergency & Useful Numbers",
  fr: "Urgences & Numéros Utiles",
  de: "Notfall & Wichtige Nummern"
};

// ---------------------------
// APPLY SAVED LANGUAGE
// ---------------------------

const savedLang = localStorage.getItem("lang") || "en";

document.getElementById("emergencyBtn").textContent = translations[savedLang];

// Highlight selected button
document.querySelectorAll('.lang-switch button').forEach(btn=>{
  if(btn.dataset.lang === savedLang){
    btn.classList.add("active");
  }
});

// ---------------------------
// LANGUAGE SWITCH HANDLER
// ---------------------------

document.querySelectorAll('.lang-switch button').forEach(btn => {

  btn.addEventListener('click', () => {

    const selectedLang = btn.dataset.lang;

    // Save language
    localStorage.setItem("lang", selectedLang);

    // Update button text instantly
    document.getElementById("emergencyBtn").textContent =
      translations[selectedLang];

    // Highlight active
    document.querySelectorAll('.lang-switch button')
      .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    // Redirect after slight delay (smooth UX)
  //  setTimeout(()=>{
   //   window.location.href = "restaurants.html";
  //  },300);

  });

});

// ---------------------------
// EMERGENCY BUTTON ACTION
// ---------------------------

document.getElementById("emergencyBtn").addEventListener("click", ()=>{
  window.location.href = "useful-numbers.html";
});

</script>


</body>
</html>
