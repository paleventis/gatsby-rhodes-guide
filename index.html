<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rhodes Island Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="landing.css" />
</head>








<body class="index-page">

<div class="lang-switch">
  <button data-lang="en">EN</button>
  <button data-lang="fr">FR</button>
  <button data-lang="de">DE</button>
</div>





  <section class="hero">
    <h1>Rhodes Island</h1>
    <p>Discover • Taste • Explore • Experience</p>

    <div class="menu">
  <a href="restaurants.html" class="tab restaurants">
    🍽️ Restaurants
  </a>

  <a href="coffee.html" class="tab coffee">
    ☕ Coffee & Brunch
  </a>

  <a href="clubs.html" class="tab clubs">
    🎶 Clubs & Nightlife
  </a>

  <a href="beaches.html" class="tab beaches">
    🏖️ Beaches
  </a>

  <a href="activities.html" class="tab activities">
    🚴 Activities
  </a>

  <a href="sightseeing.html" class="tab sightseeing">
    🏛️ Culture
  </a>
</div>


    <button id="use-location" class="location-btn" onclick="window.location.href='useful-numbers.html'">
     📞 <span id="emergencyText">Emergency & Useful Numbers</span>
     </button>


  </section>

<script src="js/landing.js"></script>


<script>

const translations = {
  en: "Emergency & Useful Numbers",
  fr: "Urgences & Numéros Utiles",
  de: "Notfall & Wichtige Nummern"
};

const buttons = document.querySelectorAll('.lang-switch button');

buttons.forEach(btn => {

  btn.addEventListener('click', () => {

    const selectedLang = btn.dataset.lang;

    // Save language
    localStorage.setItem("lang", selectedLang);

    // Update text instantly
    document.getElementById("emergencyText").textContent =
      translations[selectedLang];

    // Redirect after small delay (optional smoother UX)
   // setTimeout(()=>{window.location.href = "restaurants.html";
   // },300);

  });

});

</script>




</body>
</html>
