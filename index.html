<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rhodes Island Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="landing.css" />
</head>

<body class="index-page">

  <div class="top-right-controls">
    <div class="lang-switch">
      <button data-lang="en">EN</button>
      <button data-lang="fr">FR</button>
      <button data-lang="de">DE</button>
  
    </div>
  <button id="emergencyBtn" class="emergencyBtn-btn" onclick="goToUsefulNumbers()">
      📞 Emergency & Useful Numbers
    </button>
  </div>

  <section class="hero">
    <h1 id="heroTitle">Rhodes Island</h1>
    <p id="heroSubtitle">Discover • Taste • Explore • Experience</p>

    <div class="menu">
      <a href="restaurants.html" class="tab restaurants">
        🍽️ Restaurants
      </a>

      <a href="coffee.html" class="tab coffee">
        ☕ Coffee & Brunch
      </a>

      <a href="clubs.html" class="tab clubs">
        🎶 Clubs & Nightlife
      </a>

      <a href="beaches.html" class="tab beaches">
        🏖️ Beaches
      </a>

      <a href="activities.html" class="tab activities">
        🚴 Activities
      </a>

      <a href="sightseeing.html" class="tab sightseeing">
        🏛️ Culture
      </a>


    </div>



  </section>



  <script>
    // ---------------------------
    // TRANSLATIONS
    // ---------------------------

    const translations = {
      title: {
        en: "Rhodes Island",
        fr: "Île de Rhodes",
        de: "Insel Rhodos"
      },
      subtitle: {
        en: "Discover • Taste • Explore • Experience",
        fr: "Découvrez • Goûtez • Explorez • Vivez",
        de: "Entdecken • Genießen • Erkunden • Erleben"
      },
      emergencyBtn: {
        en: "📞 Emergency & Useful Numbers",
        fr: "📞 Urgences & Numéros Utiles",
        de: "📞 Notfall & Wichtige Nummern"
      }
    };

    // ---------------------------
    // INITIALIZE PAGE
    // ---------------------------

    function initializePage() {
      // Get saved language or default to English
      const savedLang = localStorage.getItem("selectedLanguage") || "en";
      
      // Update all text content
      updatePageContent(savedLang);
      
      // Highlight active language button
      highlightActiveLanguage(savedLang);
    }

    function updatePageContent(lang) {
      // Update title
      const heroTitle = document.getElementById("heroTitle");
      if (heroTitle) {
        heroTitle.textContent = translations.title[lang];
      }

      // Update subtitle
      const heroSubtitle = document.getElementById("heroSubtitle");
      if (heroSubtitle) {
        heroSubtitle.textContent = translations.subtitle[lang];
      }

      // Update emergency button
      const emergencyBtn = document.getElementById("emergencyBtn");
      if (emergencyBtn) {
        emergencyBtn.textContent = translations.emergencyBtn[lang];
      }
    }

    function highlightActiveLanguage(lang) {
      document.querySelectorAll('.lang-switch button').forEach(btn => {
        btn.classList.remove("active");
        if (btn.dataset.lang === lang) {
          btn.classList.add("active");
        }
      });
    }

    // ---------------------------
    // LANGUAGE SWITCH HANDLER
    // ---------------------------

    document.querySelectorAll('.lang-switch button').forEach(btn => {
      btn.addEventListener('click', function() {
        const selectedLang = this.dataset.lang;
        
        // Save language to localStorage
        localStorage.setItem("selectedLanguage", selectedLang);
        
        // Update all page content immediately
        updatePageContent(selectedLang);
        
        // Highlight active button
        highlightActiveLanguage(selectedLang);
      });
    });

    // ---------------------------
    // EMERGENCY BUTTON ACTION
    // ---------------------------

    function goToUsefulNumbers() {
      // Save language to localStorage
        
      window.location.href = 'useful-numbers.html';
    }

    // ---------------------------
    // INITIALIZE ON PAGE LOAD
    // ---------------------------

    window.addEventListener('load', function() {
      initializePage();
    });
  </script>

</body>
</html>
