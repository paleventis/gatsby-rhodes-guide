<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Useful Numbers - Rhodes Island Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="landing.css" />
  <style>
    .numbers-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .number-tab {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      border-left: 5px solid #00c2cb;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .number-tab:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateX(10px);
    }

    .number-tab h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .number-tab p {
      margin: 5px 0;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: #fff;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      z-index: 10;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .category-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 10px;
      text-align: center;
      color: #d4af37;
    }
  </style>
</head>

<body>

  <!-- Back Button -->
  <button class="back-btn" onclick="goBack()">← Back</button>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Useful Numbers</h1>
    <p id="subtitle">Emergency & Services</p>

    <div id="numbers-container" class="numbers-container"></div>
  </section>

  <script src="useful-numbers.js"></script>

</body>
</html>
